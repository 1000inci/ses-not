<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0F0D">
<title>Sesli Not</title>
<style>
  :root{
    --bg:#0A0F0D;
    --panel:#121915;
    --panel-elev:#1A2420;
    --line:#23302A;
    --text:#E9F1ED;
    --text-dim:#8AA39B;
    --text-faint:#4F635A;
    --accent:#E8A33D;
    --accent-dim:#7A5E2A;
    --rec:#FF5C5C;
    --rec-dim:#4A2424;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    font-family:var(--sans);
    color:var(--text);
    min-height:100vh;
    -webkit-tap-highlight-color:transparent;
  }
  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    padding-bottom:32px;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:18px 20px 14px;
    border-bottom:1px solid var(--line);
  }
  header h1{
    font-family:var(--mono);
    font-size:14px;
    letter-spacing:.14em;
    font-weight:600;
    margin:0;
    color:var(--text);
  }
  header h1 span{color:var(--accent);}
  .status{
    display:flex;
    align-items:center;
    gap:7px;
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:.08em;
    color:var(--text-dim);
  }
  .dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--text-faint);
    flex-shrink:0;
  }
  .dot.rec{background:var(--rec); animation:blink 1s ease-in-out infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

  main{padding:28px 20px 8px;}

  .mic-stage{
    position:relative;
    width:140px;height:140px;
    margin:6px auto 18px;
    display:flex;align-items:center;justify-content:center;
  }
  .ring{
    position:absolute;
    width:84px;height:84px;
    border-radius:50%;
    border:1px solid var(--accent-dim);
    opacity:0;
  }
  .mic-stage.listening .ring{
    border-color:var(--rec);
    animation:pulse-ring 1.8s ease-out infinite;
  }
  .mic-stage.listening .ring.r2{animation-delay:.6s;}
  @keyframes pulse-ring{
    0%{transform:scale(1); opacity:.55;}
    100%{transform:scale(1.9); opacity:0;}
  }
  .mic-btn{
    position:relative;
    z-index:1;
    width:84px;height:84px;
    border-radius:50%;
    border:1px solid var(--accent-dim);
    background:var(--panel-elev);
    color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .2s, border-color .2s, color .2s, transform .15s;
  }
  .mic-btn:active{transform:scale(.96);}
  .mic-stage.listening .mic-btn{
    background:var(--rec-dim);
    border-color:var(--rec);
    color:var(--rec);
  }
  .mic-btn.disabled{opacity:.4; cursor:not-allowed;}
  .mic-btn:focus-visible{outline:2px solid var(--accent); outline-offset:3px;}

  .interim{
    min-height:18px;
    text-align:center;
    font-size:13px;
    color:var(--text-faint);
    font-style:italic;
    margin-bottom:10px;
    padding:0 10px;
  }

  textarea#transcript{
    width:100%;
    min-height:120px;
    resize:vertical;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.5;
    padding:14px;
    outline:none;
  }
  textarea#transcript:focus{border-color:var(--accent-dim);}
  textarea#transcript::placeholder{color:var(--text-faint);}

  .actions{
    display:flex;
    gap:10px;
    margin-top:12px;
  }
  .btn{
    flex:1;
    border-radius:9px;
    padding:13px 10px;
    font-size:14px;
    font-weight:600;
    font-family:var(--sans);
    border:1px solid var(--line);
    cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:scale(.98);}
  .btn.ghost{background:transparent; color:var(--text-dim);}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#1A1404;}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px;}

  .notes-section{padding:30px 20px 0;}
  .notes-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:12px;
  }
  .notes-head h2{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.1em;
    color:var(--text-dim);
    margin:0;
    white-space:nowrap;
  }
  .count{
    color:var(--accent);
    margin-left:4px;
  }
  #searchInput{
    flex:1;
    min-width:0;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-size:13px;
    padding:8px 10px;
    outline:none;
  }
  #searchInput:focus{border-color:var(--accent-dim);}

  .notes-list{display:flex; flex-direction:column; gap:10px;}
  .note-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:13px 14px;
  }
  .note-date{
    font-family:var(--mono);
    font-size:11px;
    color:var(--accent);
    letter-spacing:.04em;
    margin-bottom:6px;
  }
  .note-text{
    font-size:14px;
    line-height:1.5;
    color:var(--text);
    white-space:pre-wrap;
    margin-bottom:10px;
  }
  .note-actions{display:flex; gap:8px;}
  .mini-btn{
    font-size:12px;
    font-family:var(--sans);
    background:var(--panel-elev);
    border:1px solid var(--line);
    color:var(--text-dim);
    border-radius:7px;
    padding:7px 11px;
    cursor:pointer;
  }
  .mini-btn:active{transform:scale(.96);}
  .mini-btn.danger{color:var(--rec); border-color:var(--rec-dim);}

  .empty{
    text-align:center;
    color:var(--text-faint);
    font-size:13px;
    padding:24px 10px;
    border:1px dashed var(--line);
    border-radius:10px;
  }

  .toast{
    position:fixed;
    left:50%;
    bottom:24px;
    transform:translate(-50%, 16px);
    background:var(--panel-elev);
    border:1px solid var(--line);
    color:var(--text);
    font-size:13px;
    padding:10px 18px;
    border-radius:30px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s, transform .2s;
    max-width:90%;
    text-align:center;
    z-index:10;
  }
  .toast.show{opacity:1; transform:translate(-50%, 0);}

  footer{
    text-align:center;
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:.08em;
    color:var(--text-faint);
    padding:26px 0 4px;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>SESLİ<span>•</span>NOT</h1>
    <div class="status">
      <span class="dot" id="statusDot"></span>
      <span id="statusLabel">HAZIR</span>
    </div>
  </header>

  <main>
    <div class="mic-stage" id="micStage">
      <div class="ring r1"></div>
      <div class="ring r2"></div>
      <button class="mic-btn" id="micBtn" aria-label="Kaydı başlat"></button>
    </div>
    <div class="interim" id="interim"></div>
    <textarea id="transcript" placeholder="Mikrofona dokunup konuşmaya başlayın. Metin burada görünecek, gerekirse elle de düzenleyebilirsiniz."></textarea>
    <div class="actions">
      <button class="btn ghost" id="clearBtn">Temizle</button>
      <button class="btn primary" id="saveBtn">Kaydet</button>
    </div>
  </main>

  <section class="notes-section">
    <div class="notes-head">
      <h2>NOTLAR<span class="count" id="noteCount">0</span></h2>
      <input id="searchInput" type="search" placeholder="Ara...">
    </div>
    <div class="notes-list" id="notesList"></div>
    <div class="empty" id="emptyState">Henüz kayıtlı not yok. İlk notunu kaydet.</div>
  </section>

  <footer>M.ACAR — SESLİ NOT</footer>
</div>

<div class="toast" id="toast"></div>

<script>
  const micIconSVG = '<svg viewBox="0 0 24 24" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 1 0-6 0v5a3 3 0 0 0 3 3Z" fill="currentColor"/><path d="M19 11a7 7 0 0 1-14 0M12 18v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
  const stopIconSVG = '<svg viewBox="0 0 24 24" width="26" height="26" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="12" height="12" rx="2.5" fill="currentColor"/></svg>';

  const micBtn = document.getElementById('micBtn');
  const micStage = document.getElementById('micStage');
  const interimEl = document.getElementById('interim');
  const transcriptEl = document.getElementById('transcript');
  const statusDot = document.getElementById('statusDot');
  const statusLabel = document.getElementById('statusLabel');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');
  const notesList = document.getElementById('notesList');
  const noteCount = document.getElementById('noteCount');
  const emptyState = document.getElementById('emptyState');
  const searchInput = document.getElementById('searchInput');
  const toastEl = document.getElementById('toast');

  micBtn.innerHTML = micIconSVG;

  let recognition = null;
  let shouldBeListening = false;
  let allNotes = [];
  let toastTimer = null;

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
  }

  function setListeningUI(on){
    micStage.classList.toggle('listening', on);
    statusLabel.textContent = on ? 'KAYITTA' : 'HAZIR';
    statusDot.classList.toggle('rec', on);
    micBtn.innerHTML = on ? stopIconSVG : micIconSVG;
    micBtn.setAttribute('aria-label', on ? 'Kaydı durdur' : 'Kaydı başlat');
  }

  const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognitionImpl){
    interimEl.textContent = 'Bu tarayıcı sesli tanımayı desteklemiyor. Chrome ile açmayı deneyin; metni elle de yazabilirsiniz.';
    micBtn.disabled = true;
    micBtn.classList.add('disabled');
  } else {
    recognition = new SpeechRecognitionImpl();
    recognition.lang = 'tr-TR';
    recognition.continuous = true;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      let interim = '';
      let finalChunk = '';
      for(let i = e.resultIndex; i < e.results.length; i++){
        const res = e.results[i];
        if(res.isFinal){
          finalChunk += res[0].transcript;
        } else {
          interim += res[0].transcript;
        }
      }
      if(finalChunk.trim()){
        const current = transcriptEl.value;
        const needsSpace = current && !current.endsWith(' ') && !current.endsWith('\n');
        transcriptEl.value = current + (needsSpace ? ' ' : '') + finalChunk.trim() + ' ';
        transcriptEl.scrollTop = transcriptEl.scrollHeight;
      }
      interimEl.textContent = interim;
    };

    recognition.onerror = (e) => {
      if(e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        showToast('Mikrofon izni verilmedi.');
        shouldBeListening = false;
        setListeningUI(false);
      } else if(e.error === 'no-speech' || e.error === 'aborted'){
        // sessizlik normaldir, onend ile yeniden başlar
      } else {
        showToast('Tanıma hatası: ' + e.error);
      }
    };

    recognition.onend = () => {
      if(shouldBeListening){
        try{ recognition.start(); } catch(err){ /* zaten başlıyor olabilir */ }
      } else {
        setListeningUI(false);
        interimEl.textContent = '';
      }
    };

    micBtn.addEventListener('click', () => {
      if(!shouldBeListening){
        shouldBeListening = true;
        try{
          recognition.start();
          setListeningUI(true);
        } catch(err){
          shouldBeListening = false;
          showToast('Başlatılamadı, tekrar deneyin.');
        }
      } else {
        shouldBeListening = false;
        recognition.stop();
        setListeningUI(false);
      }
    });
  }

  clearBtn.addEventListener('click', () => {
    transcriptEl.value = '';
    interimEl.textContent = '';
    transcriptEl.focus();
  });

  saveBtn.addEventListener('click', async () => {
    const text = transcriptEl.value.trim();
    if(!text){
      showToast('Kaydedilecek metin yok.');
      return;
    }
    const id = 'note_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
    const note = { id: id, text: text, createdAt: new Date().toISOString() };
    saveBtn.disabled = true;
    try{
      const result = await window.storage.set('notes:' + id, JSON.stringify(note), false);
      if(!result){
        showToast('Kaydedilemedi, tekrar deneyin.');
        saveBtn.disabled = false;
        return;
      }
      allNotes.unshift(note);
      renderNotes();
      transcriptEl.value = '';
      interimEl.textContent = '';
      showToast('Not kaydedildi.');
    } catch(err){
      showToast('Kaydetme sırasında hata oluştu.');
    } finally {
      saveBtn.disabled = false;
    }
  });

  function formatDate(iso){
    const d = new Date(iso);
    return d.toLocaleString('tr-TR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function renderNotes(){
    const q = searchInput.value.trim().toLocaleLowerCase('tr-TR');
    const filtered = q ? allNotes.filter(n => n.text.toLocaleLowerCase('tr-TR').includes(q)) : allNotes;
    noteCount.textContent = String(allNotes.length);
    notesList.innerHTML = '';

    if(allNotes.length === 0){
      emptyState.style.display = 'block';
      emptyState.textContent = 'Henüz kayıtlı not yok. İlk notunu kaydet.';
      return;
    }
    if(filtered.length === 0){
      emptyState.style.display = 'block';
      emptyState.textContent = 'Eşleşen not bulunamadı.';
      return;
    }
    emptyState.style.display = 'none';

    filtered.forEach(note => {
      const card = document.createElement('div');
      card.className = 'note-card';

      const dateEl = document.createElement('div');
      dateEl.className = 'note-date';
      dateEl.textContent = formatDate(note.createdAt);

      const textEl = document.createElement('div');
      textEl.className = 'note-text';
      textEl.textContent = note.text;

      const actions = document.createElement('div');
      actions.className = 'note-actions';

      const copyBtn = document.createElement('button');
      copyBtn.className = 'mini-btn';
      copyBtn.textContent = 'Kopyala';
      copyBtn.addEventListener('click', async () => {
        try{
          await navigator.clipboard.writeText(note.text);
          showToast('Kopyalandı.');
        } catch(err){
          showToast('Kopyalanamadı.');
        }
      });

      const dlBtn = document.createElement('button');
      dlBtn.className = 'mini-btn';
      dlBtn.textContent = 'İndir';
      dlBtn.addEventListener('click', () => {
        const blob = new Blob([note.text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'not-' + note.createdAt.slice(0, 10) + '.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'mini-btn danger';
      delBtn.textContent = 'Sil';
      delBtn.addEventListener('click', async () => {
        try{
          await window.storage.delete('notes:' + note.id, false);
        } catch(err){ /* zaten silinmiş olabilir */ }
        allNotes = allNotes.filter(n => n.id !== note.id);
        renderNotes();
        showToast('Not silindi.');
      });

      actions.appendChild(copyBtn);
      actions.appendChild(dlBtn);
      actions.appendChild(delBtn);
      card.appendChild(dateEl);
      card.appendChild(textEl);
      card.appendChild(actions);
      notesList.appendChild(card);
    });
  }

  searchInput.addEventListener('input', renderNotes);

  async function loadNotes(){
    try{
      const result = await window.storage.list('notes:', false);
      if(!result || !result.keys || result.keys.length === 0){
        allNotes = [];
        renderNotes();
        return;
      }
      const loaded = [];
      for(const key of result.keys){
        try{
          const item = await window.storage.get(key, false);
          if(item && item.value){
            loaded.push(JSON.parse(item.value));
          }
        } catch(err){ /* anahtar bulunamadıysa atla */ }
      }
      loaded.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
      allNotes = loaded;
      renderNotes();
    } catch(err){
      emptyState.style.display = 'block';
      emptyState.textContent = 'Notlar yüklenemedi.';
    }
  }

  loadNotes();
</script>
</body>
</html>
